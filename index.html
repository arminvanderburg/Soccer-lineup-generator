<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soccer Lineup Creator</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div class="import-export-container" id="export-container">
        <div class="top-bar">
            <a class="top-bar-text"><b>Share</b></a>
            <button class="close-button"><b>X</b></button>
        </div>

        <textarea id="share-url" readonly></textarea>

        <div class="share-options">
            <label>
                <input type="checkbox" id="allow-edit-checkbox" checked> Allow editing
            </label>
         </div>

        <div class="export-button-container">
            <button class="btn" id="copy-btn">Copy</button>
        </div>
    </div>

    <div class="container">
        <div class="main-content">
            <div id="field"></div>
            <div class="button-container">
                <button class="btn" id="Export">Share</button>
                <button class="btn" id="ResetBtn">Reset</button>
            </div>
            <a id="view-mode-indicator" style="display: none;">Read only</a>
        </div>

        <div class="sidebar">
            <div id="players">
                <div class="player" draggable="true" id="p1">1</div>
                <div class="player" draggable="true" id="p2">2</div>
                <div class="player" draggable="true" id="p3">3</div>
                <div class="player" draggable="true" id="p4">4</div>
                <div class="player" draggable="true" id="p5">5</div>
                <div class="player" draggable="true" id="p6">6</div>
                <div class="player" draggable="true" id="p7">7</div>
                <div class="player" draggable="true" id="p8">8</div>
                <div class="player" draggable="true" id="p9">9</div>
                <div class="player" draggable="true" id="p10">10</div>
                <div class="player" draggable="true" id="p11">11</div>
                <div class="player" draggable="true" id="p12">12</div>
                <div class="player" draggable="true" id="p13">13</div>
                <div class="player" draggable="true" id="p14">14</div>
                <div class="player" draggable="true" id="p15">15</div>
                <div class="player" draggable="true" id="p16">16</div>
                <div class="player" draggable="true" id="p17">17</div>
            </div>
        </div>
    </div>

    <script src="src/main.js"></script>
    <script src="src/import-export.js"></script>
</body>
</html>

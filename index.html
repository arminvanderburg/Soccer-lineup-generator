<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lineup Generator</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>

    <div class="import-export-container" id="export-container">
        <div class="top-bar">
            <a class="top-bar-text"><b>Export</b></a>
            <button class="close-button"><b>X</b></button>
        </div>

        <div style="padding: 2vmin; display: flex; flex-direction: column; gap: 2vmin; width: 80%;">
            <input type="text" id="share-url" readonly style="width: 100%; padding: 1vmin; font-size: 2vmin;">
        </div>
    </div>

    <div class="container">

        <div class="main-content">
            <div id="field" ondrop="drop(event)" ondragover="allowDrop(event)">
            </div>

            <div class="button-container">
                <button class="btn" id="Export">Export</button>
                <button class="btn" id="Import">Import</button>
            </div>
        </div>

        <div class="sidebar">
            <div id="players">
                <div class="player" draggable="true" ondragstart="drag(event)" id="p1">1</div>
                <div class="player" draggable="true" ondragstart="drag(event)" id="p2">2</div>
                <div class="player" draggable="true" ondragstart="drag(event)" id="p3">3</div>
                <div class="player" draggable="true" ondragstart="drag(event)" id="p4">4</div>
                <div class="player" draggable="true" ondragstart="drag(event)" id="p5">5</div>
                <div class="player" draggable="true" ondragstart="drag(event)" id="p6">6</div>
                <div class="player" draggable="true" ondragstart="drag(event)" id="p7">7</div>
                <div class="player" draggable="true" ondragstart="drag(event)" id="p8">8</div>
                <div class="player" draggable="true" ondragstart="drag(event)" id="p9">9</div>
                <div class="player" draggable="true" ondragstart="drag(event)" id="p10">10</div>
                <div class="player" draggable="true" ondragstart="drag(event)" id="p11">11</div>
                <div class="player" draggable="true" ondragstart="drag(event)" id="p12">12</div>
                <div class="player" draggable="true" ondragstart="drag(event)" id="p13">13</div>
                <div class="player" draggable="true" ondragstart="drag(event)" id="p14">14</div>
                <div class="player" draggable="true" ondragstart="drag(event)" id="p15">15</div>
                <div class="player" draggable="true" ondragstart="drag(event)" id="p16">16</div>
                <div class="player" draggable="true" ondragstart="drag(event)" id="p17">17</div>
            </div>
        </div>

    </div>
    <script src="src/main.js"></script>
    <script src="src/import-export.js"></script>
</body>
</html>
